name: DOMAIN.md Auto Sync

on:
  pull_request:
    types: [closed]
    branches:
      - dev
      - prod

jobs:
  domain-sync:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect models.py changes
        id: changed
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          if echo "$CHANGED" | grep -qE '(^|/)models\.py$'; then
            echo "has_model_changes=true" >> $GITHUB_OUTPUT
            echo "Changed models.py files:"
            echo "$CHANGED" | grep -E '(^|/)models\.py$'
          else
            echo "has_model_changes=false" >> $GITHUB_OUTPUT
            echo "No models.py changes detected — skipping DOMAIN.md sync"
          fi

      - name: Install Claude Code CLI
        if: steps.changed.outputs.has_model_changes == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate DOMAIN.md skeletons (new apps)
        if: steps.changed.outputs.has_model_changes == 'true'
        run: |
          if [ -f ".claude/scripts/domain-init.sh" ]; then
            bash .claude/scripts/domain-init.sh .
          else
            echo "domain-init.sh not found — skipping skeleton generation"
          fi

      - name: Fill DOMAIN.md with Claude Code
        if: steps.changed.outputs.has_model_changes == 'true'
        run: |
          if [ -f ".claude/scripts/domain-fill.sh" ]; then
            bash .claude/scripts/domain-fill.sh .
          else
            echo "domain-fill.sh not found — skipping DOMAIN.md fill"
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated DOMAIN.md files
        if: steps.changed.outputs.has_model_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add '**/DOMAIN.md'

          if git diff --staged --quiet; then
            echo "No DOMAIN.md changes to commit"
          else
            git commit -m "docs: DOMAIN.md 자동 업데이트 — PR #${{ github.event.pull_request.number }}"
            git push
          fi
