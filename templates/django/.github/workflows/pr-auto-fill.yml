name: Auto-fill PR Template

on:
  pull_request:
    types: [opened]
    branches: [prod, dev]

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  auto-fill-template:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})
          {
            echo "files<<EOF"
            echo "$CHANGED_FILES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Get code diff for AI analysis
        id: get-diff
        run: |
          git diff ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} > diff_raw.txt
          DIFF_LENGTH=$(wc -c < diff_raw.txt)
          if [ $DIFF_LENGTH -gt 50000 ]; then
            head -n 1000 diff_raw.txt > diff_truncated.txt
            echo -e "\n\n[... diff truncated due to size ...]" >> diff_truncated.txt
            mv diff_truncated.txt diff_raw.txt
          fi
          DIFF_BASE64=$(base64 -w 0 < diff_raw.txt)
          echo "diff_base64=$DIFF_BASE64" >> $GITHUB_OUTPUT

      - name: Analyze changes with AI
        id: analyze
        run: |
          echo "${{ steps.get-diff.outputs.diff_base64 }}" | base64 -d > diff_content.txt

          SYSTEM_PROMPT="당신은 Django 백엔드 API 프로젝트의 git diff 내용을 분석하는 전문가입니다. 주어진 변경 사항을 기반으로 PR 템플릿 구조에 맞춰 핵심 요약을 작성하세요. 변경이 실제 감지된 부분만 작성합니다. 한글로 작성하고, 기술적이면서도 맥락 중심의 설명을 사용합니다."

          jq -n \
            --arg system_prompt "$SYSTEM_PROMPT" \
            --arg diff "$(cat diff_content.txt)" \
            '{
              "model": "gpt-4o-mini",
              "messages": [
                {"role": "system", "content": $system_prompt},
                {"role": "user", "content": ("다음은 Django 프로젝트의 git diff입니다. 이 변경사항을 분석해서 무엇이 구현되었는지 설명해주세요:\n\n```diff\n" + $diff + "\n```")}
              ],
              "max_tokens": 1500,
              "temperature": 0.3
            }' > analysis_request.json

          RESPONSE=$(curl -s -X POST "https://api.openai.com/v1/chat/completions" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @analysis_request.json)

          SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "AI 분석에 실패했습니다. 수동으로 내용을 작성해주세요."')

          {
            echo "summary<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Update PR template
        uses: actions/github-script@v7
        env:
          AI_SUMMARY: ${{ steps.analyze.outputs.summary }}
        with:
          script: |
            if (!context.payload.pull_request) {
              console.log('No pull request context found, skipping...');
              return;
            }

            const summary = process.env.AI_SUMMARY || "AI 분석에 실패했습니다. 수동으로 내용을 작성해주세요.";

            const template = [
              '## 📸 작동 사진/영상',
              '<!-- 내가 개발한 기능을 단 하나의 사진으로 요약한다면? -->',
              '',
              '## 📝 주요 변경 사항',
              summary,
              '',
              '## 🔗 참고 링크',
              '<!-- 기획 문서나 피그마 링크 등 리뷰어의 이해를 돕는 자료가 있다면 작성해주세요 -->',
              '',
              '## 💬 리뷰어에게',
              '<!-- 리뷰어가 특별히 봐주었으면 하는 부분이 있다면 작성해주세요 -->'
            ].join('\n');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: template
            });
